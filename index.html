<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sultan Elite | Tic Tac Toe</title>
    <link rel="stylesheet" href="tictac.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="game-container">
        <h1 class="title">TIC TAC <span class="glow">TOE</span></h1>
        
        <div id="status" class="status">Player X's Turn</div>

        <div class="board">
            <div id="0" onclick="handleClick(this)" class="box"></div>
            <div id="1" onclick="handleClick(this)" class="box"></div>
            <div id="2" onclick="handleClick(this)" class="box"></div>
            <div id="3" onclick="handleClick(this)" class="box"></div>
            <div id="4" onclick="handleClick(this)" class="box"></div>
            <div id="5" onclick="handleClick(this)" class="box"></div>
            <div id="6" onclick="handleClick(this)" class="box"></div>
            <div id="7" onclick="handleClick(this)" class="box"></div>
            <div id="8" onclick="handleClick(this)" class="box"></div>
        </div>

        <button class="reset-btn" onclick="location.reload()">Reset Game</button>
    </div>
    <script src="Tictac.js"></script>
</body>
</html>
